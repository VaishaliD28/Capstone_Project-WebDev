version: '3.8'

services:
  backend:
    build: ./backend
    container_name: resumify_backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      JWT_SECRET: change-this-in-production
      FRONTEND_URL: http://localhost:5173
    volumes:
      # Persist the SQLite database file across container restarts
      - sqlite_data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: resumify_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000
    restart: unless-stopped

volumes:
  sqlite_data: